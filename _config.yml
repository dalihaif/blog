# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
paginate: 20
exclude:
  [
    "less",
    "node_modules",
    "Gruntfile.js",
    "package.json",
    "package-lock.json",
    "README.md",
    "README.zh.md",
    "DEPLOY.md",
    "BLOG_README.md",
    "PROJECT_SUMMARY.md",
    "快速开始.md",
    "Gemfile",
    "Gemfile.lock",
    "netlify.toml",
    "nul",
    "_temp_*",
    "_split_*",
    "CONTENT_UPDATE_SUMMARY.md",
    "INSTALL_RUBY.md",
    "LICENSE",
    "TODO.md",
    "TROUBLESHOOTING.md",
    "Rakefile",
    "admin",
    "xiaohongshu",
  ]
include: ["_redirects"]
anchorjs: true # if you want to customize anchor. check out line:181 of `post.html`
# If you have timezone issue (e.g. #68) in China, uncomment to use this:
#timezone: CN

# Gems
# from PR#40, to support local preview for Jekyll 3.0
# make sure you have this gem installed
# `$ gem install jekyll-paginate`
plugins: [jekyll-paginate]

# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM # use Github Flavored Markdown !important
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Giscus 评论系统设置（基于 GitHub Discussions，免费无后端）
# 获取配置值：打开 https://giscus.app → 输入仓库名 dalihaif/blog → 复制生成的 repo_id 和 category_id
# 前提条件：
#   1. 仓库已开启 Discussions：仓库 Settings → General → Features → 勾选 Discussions
#   2. 已安装 Giscus App：https://github.com/apps/giscus → Install → 选择 dalihaif/blog
giscus_enable: true
giscus_repo: "dalihaif/blog"
giscus_repo_id: R_kgDOS6j9PA  # 从 https://giscus.app 获取
giscus_category: "Announcements"
giscus_category_id: DIC_kwDOS6j9PM4C_RBb  # 从 https://giscus.app 获取
giscus_mapping: pathname  # 评论关联方式：pathname(推荐) / url / title
giscus_theme: preferred_color_scheme  # 主题：preferred_color_scheme(跟随系统) / light / dark / dark_dimmed
giscus_lang: zh-CN  # 语言

# Netease settings
netease_comment: false

